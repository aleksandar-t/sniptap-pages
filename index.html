<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnipTap</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #111318;
      --card: #1b1f27;
      --text: #f5f7fb;
      --muted: #b7c0cf;
      --accent: #7c6cff;
      --border: rgba(255,255,255,0.10);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --text: #151922;
        --muted: #5f6b7a;
        --accent: #5b4dff;
        --border: rgba(0,0,0,0.08);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>SnipTap</h1>
    <p>Save, organize, and reuse text snippets faster.</p>
    <div class="links">
      <a href="/privacy.html">Privacy Policy</a>
      <a href="mailto:support@sniptap.app">support@sniptap.app</a>
    </div>
  </main>
</body>
</html>
